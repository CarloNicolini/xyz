name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Octave (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends octave octave-dev

      - name: Install Octave (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install octave

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest

      - name: Build MEX files
        run: make mex

      - name: Run tests
        run: pytest tests/ -v

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install sphinx pydata-sphinx-theme sphinx-copybutton plotly

      - name: Build docs
        run: make docs
